<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#030712"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Logo mark -->
  <rect x="540" y="155" width="120" height="120" rx="28" fill="#6366f1"/>
  <text x="600" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="900" fill="white">U</text>

  <!-- Main title -->
  <text x="600" y="345" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="64" font-weight="900" fill="#f1f5f9" letter-spacing="-1">Usternium</text>

  <!-- Tagline -->
  <text x="600" y="405" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" fill="#475569" letter-spacing="0">Tools, Apps &amp; Experiments</text>

  <!-- Project pills -->
  <g font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600">
    <!-- Learn -->
    <rect x="210" y="450" width="120" height="36" rx="18" fill="#6366f120"/>
    <rect x="210" y="450" width="120" height="36" rx="18" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <text x="270" y="473" text-anchor="middle" fill="#818cf8">🧠 Learn</text>
    <!-- FitFlow -->
    <rect x="348" y="450" width="130" height="36" rx="18" fill="#f9731620"/>
    <rect x="348" y="450" width="130" height="36" rx="18" fill="none" stroke="#f97316" stroke-width="1" opacity="0.4"/>
    <text x="413" y="473" text-anchor="middle" fill="#fb923c">💪 FitFlow</text>
    <!-- Translate -->
    <rect x="496" y="450" width="140" height="36" rx="18" fill="#06b6d420"/>
    <rect x="496" y="450" width="140" height="36" rx="18" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <text x="566" y="473" text-anchor="middle" fill="#22d3ee">🌐 Translate</text>
    <!-- AI Forms -->
    <rect x="654" y="450" width="148" height="36" rx="18" fill="#a855f720"/>
    <rect x="654" y="450" width="148" height="36" rx="18" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
    <text x="728" y="473" text-anchor="middle" fill="#c084fc">📋 AI Forms</text>
    <!-- TON 618 -->
    <rect x="820" y="450" width="130" height="36" rx="18" fill="#c8813f20"/>
    <rect x="820" y="450" width="130" height="36" rx="18" fill="none" stroke="#c8813f" stroke-width="1" opacity="0.4"/>
    <text x="885" y="473" text-anchor="middle" fill="#d97706">🕳️ TON 618</text>
  </g>

  <!-- URL -->
  <text x="600" y="570" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#334155" letter-spacing="0.05em">usternium.com</text>
</svg>
