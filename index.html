<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Usternium — Tools, Apps & Experiments</title>
    <meta name="description" content="Usternium is a collection of free web tools and apps: a daily learning tracker, AI-powered form filler, fast language translator, web proxy, and more." />
    <meta name="keywords" content="usternium, web tools, daily learning, AI form filler, language translator, web proxy, free apps, online tools" />
    <meta name="author" content="Usternium" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://usternium.com" />

    <!-- Open Graph (Facebook, Discord, WhatsApp previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://usternium.com" />
    <meta property="og:title" content="Usternium — Tools, Apps & Experiments" />
    <meta property="og:description" content="A collection of free web tools and apps: daily learning tracker, AI form filler, language translator, web proxy, and more." />
    <meta property="og:image" content="https://usternium.com/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Usternium" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://usternium.com" />
    <meta name="twitter:title" content="Usternium — Tools, Apps & Experiments" />
    <meta name="twitter:description" content="A collection of free web tools and apps: daily learning tracker, AI form filler, language translator, web proxy, and more." />
    <meta name="twitter:image" content="https://usternium.com/og-image.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Structured data — helps Google understand the site -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Usternium",
      "url": "https://usternium.com",
      "description": "A collection of free web tools and apps including a daily learning tracker, AI form filler, language translator, and web proxy.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://usternium.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif; background: #030712; color: #f1f5f9; }
      ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0f172a; } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
      input, button, select, textarea { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
